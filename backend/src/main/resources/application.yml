spring:
  application:
    name: nabarangpur-erp

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/orclpdb
    username: erp_user
    password: erp123
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.OracleDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: c2VjdXJlLW5hYmFyYW5ncHVyLXBoYXJtYWN5LWNvbGxlZ2UtZXJwLWp3dC1zaWduaW5nLWtleS1jaGFuZ2UtbWU=
    access-token-expiry-ms: 3600000
    refresh-token-expiry-ms: 86400000
  security:
    max-failed-login-attempts: 5
    account-lock-minutes: 30
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  files:
    upload-dir: ./uploads

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.nabarangpur.erp: INFO
    org.springframework.security: WARN
